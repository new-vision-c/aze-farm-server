# Farm Management API Paths

/farms/{id}:
  get:
    tags:
      - Farms
    summary: Obtenir les détails d'une ferme
    description: Récupère les informations complètes d'une ferme incluant l'adresse, les catégories de produits et les produits
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: mongoId
        description: ID de la ferme
      - in: query
        name: category
        required: false
        schema:
          type: string
          minLength: 1
          maxLength: 50
        description: Filtrer les produits par catégorie (optionnel)
    responses:
      '200':
        description: Ferme récupérée avec succès
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: 'Ferme récupérée avec succès'
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      example: '507f1f77bcf86cd799439011'
                    name:
                      type: string
                      example: 'Ferme du Soleil'
                    description:
                      type: string
                      example: 'Ferme familiale spécialisée dans les légumes biologiques'
                    address:
                      type: string
                      example: '123 Route de la Ferme, 31200 Toulouse'
                    geoLocation:
                      type: object
                      properties:
                        latitude:
                          type: number
                          example: 43.604652
                        longitude:
                          type: number
                          example: 1.444209
                    images:
                      type: array
                      items:
                        type: string
                      example: ['https://example.com/farm1.jpg']
                    rating:
                      type: object
                      properties:
                        average:
                          type: number
                          example: 4.2
                        count:
                          type: integer
                          example: 25
                    categories:
                      type: array
                      items:
                        type: string
                      example: ['légumes', 'fruits', 'herbes aromatiques']
                    products:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            example: '507f1f77bcf86cd799439012'
                          name:
                            type: string
                            example: 'Tomates Bio'
                          price:
                            type: number
                            example: 4.50
                          unit:
                            type: string
                            example: 'kg'
                          stock:
                            type: integer
                            example: 100
                          image:
                            type: string
                            example: 'https://example.com/tomates.jpg'
                          category:
                            type: string
                            example: 'légumes'
                          createdAt:
                            type: string
                            format: date-time
                            example: '2024-01-15T10:30:00.000Z'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

/farms/{id}/rating:
  post:
    tags:
      - Farm Ratings
    summary: Noter une ferme
    description: Ajoute une note à une ferme ou modifie la note existante de l'utilisateur
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: mongoId
        description: ID de la ferme à noter
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - score
            properties:
              score:
                type: integer
                minimum: 1
                maximum: 5
                description: Note de 1 à 5
                example: 5
              comment:
                type: string
                maxLength: 500
                description: Commentaire optionnel
                example: 'Excellente ferme bio avec des produits de qualité !'
    responses:
      '201':
        description: Note enregistrée avec succès
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: 'Note enregistrée avec succès'
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      example: '507f1f77bcf86cd799439013'
                    score:
                      type: integer
                      example: 5
                    comment:
                      type: string
                      example: 'Excellente ferme bio !'
                    user:
                      type: object
                      properties:
                        id:
                          type: string
                          example: '507f1f77bcf86cd799439012'
                        fullname:
                          type: string
                          example: 'Jean Dupont'
                    createdAt:
                      type: string
                      format: date-time
                      example: '2024-01-15T10:30:00.000Z'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

  delete:
    tags:
      - Farm Ratings
    summary: Supprimer sa note
    description: Supprime la note de l'utilisateur pour une ferme
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: mongoId
        description: ID de la ferme
    responses:
      '200':
        description: Note supprimée avec succès
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: 'Note supprimée avec succès'
                data:
                  type: object
                  nullable: true
                  example: null
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

/farms/{id}/ratings:
  get:
    tags:
      - Farm Ratings
    summary: Voir toutes les notes d'une ferme
    description: Récupère toutes les notes d'une ferme avec pagination
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: mongoId
        description: ID de la ferme
      - in: query
        name: page
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page actuelle
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        description: Nombre de notes par page
    responses:
      '200':
        description: Notes récupérées avec succès
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: 'Notes récupérées avec succès'
                data:
                  type: object
                  properties:
                    ratings:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            example: '507f1f77bcf86cd799439013'
                          score:
                            type: integer
                            example: 5
                          comment:
                            type: string
                            example: 'Excellente ferme bio !'
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                                example: '507f1f77bcf86cd799439012'
                              fullname:
                                type: string
                                example: 'Jean Dupont'
                          createdAt:
                            type: string
                            format: date-time
                            example: '2024-01-15T10:30:00.000Z'
                    total:
                      type: integer
                      example: 25
                    totalPages:
                      type: integer
                      example: 3
                    currentPage:
                      type: integer
                      example: 1
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

