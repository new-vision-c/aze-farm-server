  '/api/oauth/{provider}':
    get:
      summary: 'Initier l''authentification OAuth 2.0'
      tags:
        - OAuth
      description: "Redirige vers le fournisseur OAuth pour l'authentification.\n\n**Fournisseurs supportés:**\n- google\n- github\n- facebook\n- instagram\n- twitter\n- linkedin\n"
      parameters:
        -
          in: path
          name: provider
          required: true
          schema:
            type: string
            enum:
              - google
              - github
              - facebook
              - instagram
              - twitter
              - linkedin
          description: 'Fournisseur OAuth'
        -
          in: query
          name: redirect_uri
          schema:
            type: string
          description: 'URI de redirection après authentification (optionnel)'
      responses:
        '302':
          description: 'Redirection vers le fournisseur OAuth'
        '400':
          description: 'Fournisseur non supporté'
        '500':
          description: 'Erreur de configuration OAuth'
  '/api/oauth/{provider}/callback':
    get:
      summary: 'Callback OAuth 2.0 (ne pas appeler directement)'
      tags:
        - OAuth
      description: "Point de terminaison de callback appelé par le fournisseur OAuth après l'autorisation.\n\n**Cette route ne doit pas être appelée directement par les clients.**\nElle est appelée automatiquement par le fournisseur OAuth.\n"
      parameters:
        -
          in: path
          name: provider
          required: true
          schema:
            type: string
            enum:
              - google
              - github
              - facebook
              - instagram
              - twitter
              - linkedin
          description: 'Fournisseur OAuth'
