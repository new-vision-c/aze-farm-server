      summary: 'Créer des commandes à partir du panier'
      tags:
        - Orders
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deliveryAddress
                - paymentMethod
                - phoneNumber
              properties:
                deliveryAddress:
                  type: string
                  description: 'Adresse de livraison'
                deliveryType:
                  type: string
                  enum: [PICKUP, DELIVERY, MARKET]
                  description: 'Type de livraison'
                paymentMethod:
                  type: string
                  enum: [ORANGE_MONEY, MTN_MONEY, WAVE, MOOV_MONEY]
                  description: 'Méthode de paiement'
                phoneNumber:
                  type: string
                  description: 'Numéro de téléphone pour le paiement'
      responses:
        '201':
          description: 'Commandes créées avec succès'
        '400':
          description: 'Panier vide ou stock insuffisant'
        '401':
          description: 'Non authentifié'
    get:
      summary: 'Récupérer les commandes de l''utilisateur'
      tags:
        - Orders
      security:
        -
          bearerAuth: []
      parameters:
        -
          in: query
          name: status
          schema:
            type: string
            enum:
              - PENDING
              - CONFIRMED
              - PREPARING
              - READY
              - DELIVERED
              - CANCELLED
          description: 'Filtrer par statut'
        -
          in: query
          name: page
          schema:
            type: integer
            default: 1
        -
          in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 'Liste des commandes'
        '401':
          description: 'Non authentifié'
  '/orders/{orderId}':
