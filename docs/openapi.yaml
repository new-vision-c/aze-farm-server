                properties:
                  success: {type: boolean, example: true}
                  message: {type: string, example: 'Position récupérée avec succès'}
                  data: {type: object, properties: {latitude: {type: number, example: 48.8566}, longitude: {type: number, example: 2.3522}, hasLocation: {type: boolean, example: true}}}
        '401':
          description: 'Non authentifié'
        '500':
          description: 'Erreur serveur'
